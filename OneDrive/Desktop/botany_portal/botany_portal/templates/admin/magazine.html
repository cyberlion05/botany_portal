{% extends "base.html" %}
{% block content %}
{% include "admin/_nav.html" %}
<div class="eyebrow reveal">Publications</div><h1 class="reveal">Magazine</h1>
<form class="card reveal" method="post" enctype="multipart/form-data" style="margin-bottom:18px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="grid g3"><div><label>Type</label><select name="kind"><option value="student">Student magazine</option><option value="wall">Wall magazine</option></select></div><div style="grid-column:span 2"><label>Title</label><input name="title" required></div></div>
  <label>Author</label><input name="author">
  <label>Body / content</label><textarea name="body"></textarea>
  <label>Image</label><input type="file" name="image" accept="image/*">
  <button class="btn leafy" type="submit" style="margin-top:12px">+ Add entry</button>
</form>
<div class="card reveal">{% if items %}<table><thead><tr><th>Type</th><th>Title</th><th>Author</th><th></th></tr></thead><tbody>
{% for m in items %}<tr><td><span class="pill no">{{ m.kind }}</span></td><td><b>{{ m.title }}</b></td><td class="muted">{{ m.author }}</td><td style="text-align:right"><form method="post" action="{{ url_for('admin_delete_magazine', mid=m.id) }}" style="display:inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn danger sm">Delete</button></form></td></tr>{% endfor %}
</tbody></table>{% else %}<div class="empty">No entries.</div>{% endif %}</div>
{% endblock %}
