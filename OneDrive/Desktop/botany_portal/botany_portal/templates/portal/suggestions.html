{% extends "base.html" %}
{% block content %}
<div class="eyebrow reveal">Team</div>
<h1 class="reveal">Suggestions</h1>
<p class="lead reveal" style="margin-bottom:16px">Share ideas with the team and admin.</p>
<form class="card reveal" method="post" style="margin-bottom:18px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="body">Your suggestion</label>
  <textarea id="body" name="body" required></textarea>
  <button class="btn leafy" type="submit" style="margin-top:12px">💡 Share with team</button>
</form>
{% if items %}
<div class="grid" style="gap:12px">
  {% for s in items %}<div class="card reveal"><p style="white-space:pre-line">{{ s.body }}</p><p class="muted" style="font-size:.8rem;margin-top:8px">— {{ s.author }} · {{ s.created_at.strftime('%d %b, %H:%M') }}</p></div>{% endfor %}
</div>
{% else %}<div class="empty">No suggestions yet.</div>{% endif %}
{% endblock %}
