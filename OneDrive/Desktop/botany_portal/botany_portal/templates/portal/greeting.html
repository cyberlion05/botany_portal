{% extends "base.html" %}
{% block wrapclass %}narrow{% endblock %}
{% block content %}
<section class="hero" style="text-align:center;padding:54px 32px">
  <div class="hero-content" style="margin:0 auto">
    <div style="font-size:3.2rem">🌿</div>
    <h1>Welcome, {{ person.name }}!</h1>
    <p class="lead" style="margin:12px auto 0;color:var(--sage)">You're checked in. Please take a seat and enjoy the programme. ✨</p>
    <div class="row" style="justify-content:center"><span class="pill gold">✓ Attendance confirmed · {{ person.roll_number }}</span></div>
  </div>
</section>
<div style="text-align:center"><a class="btn ghost dark" href="{{ url_for('checkin') }}">Check in another person</a></div>
{% endblock %}
