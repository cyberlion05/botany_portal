{% extends "base.html" %}
{% block wrapclass %}narrow{% endblock %}
{% block content %}
<div class="eyebrow reveal">Meal preference</div>
<h1 class="reveal">My tiffin</h1>
<p class="lead reveal" style="margin-bottom:18px">Tell us if you'll take the provided meal so we can plan the counts.</p>
<form class="card reveal" method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Will you take the tiffin?</label>
  <div class="grid g2" style="gap:10px">
    <label class="inline-check" style="margin:0"><input type="radio" name="choice" value="accept" {{ 'checked' if tiffin and tiffin.choice=='accept' }} onchange="document.getElementById('meal').style.display='block'"> Yes, I'll take it</label>
    <label class="inline-check" style="margin:0"><input type="radio" name="choice" value="decline" {{ 'checked' if tiffin and tiffin.choice=='decline' }} onchange="document.getElementById('meal').style.display='none'"> No, thanks</label>
  </div>
  <div id="meal" style="display:{{ 'block' if tiffin and tiffin.choice=='accept' else 'none' }}">
    <label>Meal type</label>
    <div class="grid g2" style="gap:10px">
      <label class="inline-check" style="margin:0"><input type="radio" name="meal_type" value="veg" {{ 'checked' if tiffin and tiffin.meal_type=='veg' }}> 🥗 Veg</label>
      <label class="inline-check" style="margin:0"><input type="radio" name="meal_type" value="nonveg" {{ 'checked' if tiffin and tiffin.meal_type=='nonveg' }}> 🍗 Non-veg</label>
    </div>
  </div>
  <p class="note" style="margin-top:14px">Note: tiffin is given only after you're marked <b>present</b> at the event.</p>
  <button class="btn full leafy" type="submit" style="margin-top:16px">Save preference</button>
</form>
{% endblock %}
